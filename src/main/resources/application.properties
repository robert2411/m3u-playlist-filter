spring.application.name=m3u-playlist-filter

# H2 file-based
spring.datasource.url=jdbc:h2:file:./data/playlist;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate auto schema creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Xtream Codes API credentials (used by your TV app)
xtream.username=user
xtream.password=pass

# Import playlist on application startup
import.on-startup=true

# Batch inserts for performance
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
